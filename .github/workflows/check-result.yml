name: CheckLottoResult weekly
on:
  schedule:
    - cron: 7 13 * * 6 # every Saturday on 22:07 PM (KST) — 추첨(20:35 KST) 후 결과 확인
  workflow_dispatch:
jobs:
  CheckLottoResult:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dhapi
        run: pip install dhapi
      - name: Check result and notify
        env:
          USERNAME: ${{ secrets.USER_ID }}
          PASSWORD: ${{ secrets.USER_PW }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p ~/.dhapi
          # credentials는 TOML 형식이므로 값을 따옴표로 감싸야 함
          printf '[default]\nusername = "%s"\npassword = "%s"\n' "$USERNAME" "$PASSWORD" > ~/.dhapi/credentials

          set +e
          output=$(dhapi show-buy-list -f json 2>&1)
          code=$?
          set -e
          echo "$output"
          printf '%s' "$output" > /tmp/dhapi_out.txt

          # rich 테이블은 모바일 텔레그램에서 깨져 보이므로 JSON을 간결한 텍스트로 재구성
          cat > /tmp/fmt_result.py <<'PYEOF'
          import json
          import sys

          raw = open("/tmp/dhapi_out.txt", encoding="utf-8").read()
          start = raw.find("[")
          if start < 0:
              sys.exit(1)
          try:
              items = json.loads(raw[start:])
          except ValueError:
              sys.exit(1)
          if not items:
              print("구매 내역이 없습니다.")
              sys.exit(0)

          def icon(res):
              return {"당첨": "🏆", "미추첨": "⏳", "낙첨": "😢"}.get(res, "▪️")

          groups = []
          for it in items:
              key = None
              if "numbers" not in it:
                  key = (it.get("복권명"), it.get("회차"), it.get("당첨결과"), it.get("당첨금"))
              if key is not None and groups and groups[-1][0] == key:
                  groups[-1] = (key, groups[-1][1], groups[-1][2] + 1)
              else:
                  groups.append((key, it, 1))

          lines = []
          for key, it, cnt in groups:
              res = it.get("당첨결과") or "-"
              head = f"{icon(res)} {it.get('복권명', '')} {it.get('회차', '')}회 — {res}"
              amt = it.get("당첨금", "-")
              if amt and amt != "-":
                  head += f" 💰{amt}"
              if cnt > 1:
                  head += f" ×{cnt}"
              draw = it.get("추첨일", "")
              if draw:
                  head += f" (추첨 {draw})"
              lines.append(head)
              for g in it.get("numbers", []):
                  nums = " ".join(str(n) for n in g.get("numbers", []))
                  lines.append(f"    {g.get('slot', '')} {g.get('mode', '')} · {nums}")
              lines.append("")
          print("\n".join(lines).strip())
          PYEOF

          pretty=""
          if [ "$code" -eq 0 ]; then
            pretty=$(python3 /tmp/fmt_result.py 2>/dev/null | head -c 3500) || pretty=""
          fi

          if [ "$code" -eq 0 ] && [ -n "$pretty" ]; then
            message="🎰 로또 당첨 결과 (최근 14일)"$'\n\n'"${pretty}"
          else
            # 조회 실패 또는 파싱 실패 시 원본 출력을 <pre>로 전송
            escaped=$(printf '%s' "$output" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' | head -c 3500)
            message="❌ 당첨 결과 조회 실패"$'\n'"<pre>${escaped}</pre>"
          fi
          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=${message}" || echo "::warning::텔레그램 알림 전송에 실패했습니다."

          exit $code
