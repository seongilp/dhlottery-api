name: BuyLotto645 weekly
on:
  schedule:
    - cron: 23 0 * * 0 # every Sunday on 09:23 AM (KST) — 정각(00:00 UTC)은 GitHub 혼잡으로 지연/스킵이 잦아 회피
  workflow_dispatch:      # 테스트를 위해 workflow가 dispatch 되는 경우 실행이 가능하도록 추가
jobs:
  BuyLotto645:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./ # 루트의 action.yml (composite action) 사용
        with:
          username: ${{ secrets.USER_ID }}
          password: ${{ secrets.USER_PW }}
          buy_pension720: 'true'
          recharge_amount: '10000'
          telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
