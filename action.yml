name: BuyLotto645
description: 'Buy Lotto645 (and optionally Pension720+) tickets with dhapi (비공식 동행복권 API)'
# 사용 예시 (본인 레포의 .github/workflows/buy-lotto645.yml):
#
#   name: BuyLotto645 weekly
#   on:
#     schedule:
#       - cron: 23 0 * * 0 # every Sunday on 09:23 AM (KST)
#     workflow_dispatch:
#   jobs:
#     BuyLotto645:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: seongilp/dhlottery-api@main
#           with:
#             username: ${{ secrets.USER_ID }}
#             password: ${{ secrets.USER_PW }}
#             buy_pension720: 'true'                                    # 선택: 연금복권720+도 함께 구매
#             telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}     # 선택: 구매 결과 텔레그램 알림
#             telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}         # 선택
inputs:
  username:
    description: '동행복권 아이디'
    required: true
  password:
    description: '동행복권 비밀번호'
    required: true
  buy_pension720:
    description: '연금복권720+ 자동 1세트(1~5조 동일번호 5장, 5,000원)도 함께 구매 (true/false)'
    required: false
    default: 'false'
  balance_warn_threshold:
    description: '구매 후 예치금(구매가능금액)이 이 값 이하면 텔레그램으로 충전 경고 (원, 빈 값이면 비활성화)'
    required: false
    default: '10000'
  recharge_amount:
    description: '충전 경고 시 자동 발급할 가상계좌의 입금 예정 금액 (원, 동행복권이 허용하는 금액 단위만 가능)'
    required: false
    default: '50000'
  telegram_bot_token:
    description: '텔레그램 봇 토큰 (구매 결과 알림용, 선택)'
    required: false
    default: ''
  telegram_chat_id:
    description: '텔레그램 chat_id (구매 결과 알림용, 선택)'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dhapi (from action source)
      shell: bash
      env:
        # 액션 소스에는 git 태그 정보가 없어 setuptools-scm 버전 계산이 불가능하므로 고정
        SETUPTOOLS_SCM_PRETEND_VERSION: '0.0.0'
      run: pip install "${{ github.action_path }}"
    - name: Buy lottery tickets
      shell: bash
      env:
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
        BUY_PENSION720: ${{ inputs.buy_pension720 }}
        BALANCE_WARN_THRESHOLD: ${{ inputs.balance_warn_threshold }}
        RECHARGE_AMOUNT: ${{ inputs.recharge_amount }}
        TG_TOKEN: ${{ inputs.telegram_bot_token }}
        TG_CHAT_ID: ${{ inputs.telegram_chat_id }}
      run: |
        mkdir -p ~/.dhapi
        # credentials는 TOML 형식이므로 값을 따옴표로 감싸야 함
        printf '[default]\nusername = "%s"\npassword = "%s"\n' "$USERNAME" "$PASSWORD" > ~/.dhapi/credentials

        set +e
        lotto_output=$(dhapi buy-lotto645 -y 2>&1)
        lotto_code=$?
        set -e
        echo "$lotto_output"
        printf '%s' "$lotto_output" > /tmp/dhapi_lotto.txt

        pension_code=0
        pension_output=""
        if [ "$BUY_PENSION720" = "true" ]; then
          set +e
          pension_output=$(dhapi buy-pension720 -y 2>&1)
          pension_code=$?
          set -e
          echo "$pension_output"
          printf '%s' "$pension_output" > /tmp/dhapi_pension.txt
        fi

        # rich 테이블은 모바일 텔레그램에서 깨져 보이므로 구매 결과를 간결한 텍스트로 재구성
        cat > /tmp/fmt_buy.py <<'PYEOF'
        import re
        import sys

        text = open(sys.argv[1], encoding="utf-8").read()
        idx = text.find("복권을 구매했습니다")
        if idx < 0:
            sys.exit(1)
        rows = []
        for m in re.finditer(r"│\s*([A-E])\s*│\s*(\S+)\s*│([^\n]*)", text[idx:]):
            nums = re.findall(r"\d+", m.group(3))
            if len(nums) == 6:
                rows.append(f"{m.group(1)} {m.group(2)} · {' '.join(nums)}")
        if not rows:
            sys.exit(1)
        print("\n".join(rows))
        PYEOF

        cat > /tmp/fmt_pension.py <<'PYEOF'
        import re
        import sys

        text = open(sys.argv[1], encoding="utf-8").read()
        m = re.search(r"연금복권720\+ (\d+)회 복권을 구매했습니다", text)
        n = re.search(r"│\s*1조\s*│\s*(\d+)", text)
        if not m or not n:
            sys.exit(1)
        print(f"{m.group(1)}회 · 1~5조 {n.group(1)}")
        PYEOF

        # 텔레그램 알림 (토큰/chat_id가 설정된 경우에만)
        if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
          if [ "$lotto_code" -eq 0 ] && pretty=$(python3 /tmp/fmt_buy.py /tmp/dhapi_lotto.txt 2>/dev/null); then
            message="✅ 로또6/45 구매 완료"$'\n'"${pretty}"
          else
            # 구매 실패 또는 파싱 실패 시 원본 출력을 <pre>로 전송
            escaped=$(printf '%s' "$lotto_output" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' | head -c 1700)
            if [ "$lotto_code" -eq 0 ]; then header="✅ 로또6/45 구매 완료"; else header="❌ 로또6/45 구매 실패"; fi
            message="${header}"$'\n'"<pre>${escaped}</pre>"
          fi

          if [ "$BUY_PENSION720" = "true" ]; then
            if [ "$pension_code" -eq 0 ] && pretty_p=$(python3 /tmp/fmt_pension.py /tmp/dhapi_pension.txt 2>/dev/null); then
              message="${message}"$'\n\n'"✅ 연금복권720+ 구매 완료"$'\n'"${pretty_p}"
            else
              escaped_p=$(printf '%s' "$pension_output" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' | head -c 1700)
              if [ "$pension_code" -eq 0 ]; then header_p="✅ 연금복권720+ 구매 완료"; else header_p="❌ 연금복권720+ 구매 실패"; fi
              message="${message}"$'\n\n'"${header_p}"$'\n'"<pre>${escaped_p}</pre>"
            fi
          fi

          # 구매 후 잔여 예치금 조회 및 부족 경고
          avail=$(dhapi show-balance -f json 2>/dev/null | python3 -c "import sys, json; print(json.load(sys.stdin)['구매가능금액'])" 2>/dev/null) || avail=""
          if [ -n "$avail" ]; then
            avail_fmt=$(python3 -c "import sys; print(format(int(sys.argv[1]), ','))" "$avail")
            message="${message}"$'\n\n'"💰 잔여 예치금: ${avail_fmt}원"
            if [ -n "$BALANCE_WARN_THRESHOLD" ] && [ "$avail" -le "$BALANCE_WARN_THRESHOLD" ]; then
              message="${message}"$'\n'"⚠️ 예치금이 부족합니다! 충전이 필요해요. (매주 구매에 10,000원 필요)"

              # 가상계좌를 자동 발급해서 계좌번호를 알림에 포함
              recharge_fmt=$(python3 -c "import sys; print(format(int(sys.argv[1]), ','))" "$RECHARGE_AMOUNT")
              va_output=$(dhapi assign-virtual-account "$RECHARGE_AMOUNT" 2>&1) || va_output=""
              account=$(printf '%s' "$va_output" | python3 -c "import re, sys; m = re.search(r'\[([^]]+)\]\s*([0-9-]+)', sys.stdin.read()); print(f'[{m.group(1)}] {m.group(2)}' if m else '')")
              if [ -n "$account" ]; then
                message="${message}"$'\n'"🏦 전용 가상계좌: ${account}"$'\n'"정확히 ${recharge_fmt}원을 입금하면 충전됩니다. (입금 전 계좌주 이름 확인!)"
              else
                message="${message}"$'\n'"👉 가상계좌 자동 발급에 실패했습니다. dhapi assign-virtual-account 로 직접 발급해주세요."
              fi
            fi
          else
            echo "::warning::예치금 조회에 실패했습니다."
          fi

          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=${message}" || echo "::warning::텔레그램 알림 전송에 실패했습니다."
        fi

        if [ "$lotto_code" -ne 0 ] || [ "$pension_code" -ne 0 ]; then
          exit 1
        fi
branding:
  icon: anchor
  color: yellow
