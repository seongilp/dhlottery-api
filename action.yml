name: BuyLotto645
description: 'Buy Lotto645 tickets with dhapi (비공식 동행복권 API)'
# 사용 예시 (본인 레포의 .github/workflows/buy-lotto645.yml):
#
#   name: BuyLotto645 weekly
#   on:
#     schedule:
#       - cron: 0 0 * * 0 # every Sunday on 09:00 AM (KST)
#     workflow_dispatch:
#   jobs:
#     BuyLotto645:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: roeniss/dhlottery-api@main
#           with:
#             username: ${{ secrets.USER_ID }}
#             password: ${{ secrets.USER_PW }}
#             telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }} # 선택: 구매 결과 텔레그램 알림
#             telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}     # 선택
inputs:
  username:
    description: '동행복권 아이디'
    required: true
  password:
    description: '동행복권 비밀번호'
    required: true
  telegram_bot_token:
    description: '텔레그램 봇 토큰 (구매 결과 알림용, 선택)'
    required: false
    default: ''
  telegram_chat_id:
    description: '텔레그램 chat_id (구매 결과 알림용, 선택)'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dhapi
      shell: bash
      run: pip install dhapi
    - name: Buy Lotto645
      shell: bash
      env:
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
        TG_TOKEN: ${{ inputs.telegram_bot_token }}
        TG_CHAT_ID: ${{ inputs.telegram_chat_id }}
      run: |
        mkdir -p ~/.dhapi
        # credentials는 TOML 형식이므로 값을 따옴표로 감싸야 함
        printf '[default]\nusername = "%s"\npassword = "%s"\n' "$USERNAME" "$PASSWORD" > ~/.dhapi/credentials

        set +e
        output=$(dhapi buy-lotto645 -y 2>&1)
        code=$?
        set -e
        echo "$output"

        # rich 테이블은 모바일 텔레그램에서 깨져 보이므로 구매 결과를 간결한 텍스트로 재구성
        printf '%s' "$output" > /tmp/dhapi_out.txt
        cat > /tmp/fmt_buy.py <<'PYEOF'
        import re
        import sys

        text = open("/tmp/dhapi_out.txt", encoding="utf-8").read()
        idx = text.find("복권을 구매했습니다")
        if idx < 0:
            sys.exit(1)
        rows = []
        for m in re.finditer(r"│\s*([A-E])\s*│\s*(\S+)\s*│([^\n]*)", text[idx:]):
            nums = re.findall(r"\d+", m.group(3))
            if len(nums) == 6:
                rows.append(f"{m.group(1)} {m.group(2)} · {' '.join(nums)}")
        if not rows:
            sys.exit(1)
        print("\n".join(rows))
        PYEOF

        # 텔레그램 알림 (토큰/chat_id가 설정된 경우에만)
        if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
          pretty=""
          if [ "$code" -eq 0 ]; then
            pretty=$(python3 /tmp/fmt_buy.py 2>/dev/null) || pretty=""
          fi
          if [ "$code" -eq 0 ] && [ -n "$pretty" ]; then
            message="✅ 로또6/45 구매 완료"$'\n\n'"${pretty}"
          else
            # 구매 실패 또는 파싱 실패 시 원본 출력을 <pre>로 전송
            # (HTML parse_mode용 이스케이프 + 텔레그램 메시지 길이 제한(4096) 대비 절단)
            escaped=$(printf '%s' "$output" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' | head -c 3500)
            if [ "$code" -eq 0 ]; then
              header="✅ 로또6/45 구매 완료"
            else
              header="❌ 로또6/45 구매 실패"
            fi
            message="${header}"$'\n'"<pre>${escaped}</pre>"
          fi
          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=${message}" || echo "::warning::텔레그램 알림 전송에 실패했습니다."
        fi

        exit $code
branding:
  icon: anchor
  color: yellow
